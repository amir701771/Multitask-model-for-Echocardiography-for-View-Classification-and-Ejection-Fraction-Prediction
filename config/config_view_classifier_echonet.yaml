data:
  dataset_class: EchoNetViewDataset
  dataset_module: src.data_handling.dataset_echonet
  video_dir: "data/EchoNet-Dynamic/Videos"

  processed_dir: "processed_data/echonet"
  view_mapping:
    '2CH': 0
    '4CH': 1
  num_views: 2

  dataset_class: "EchoNetViewDataset"
preprocessing:
  img_size: [112, 112]

model:
  architecture: "cnn_view_classifier"
  backbone: "resnet18"
  pretrained: true
  dropout_rate: 0.3

training:
  output_dir: "results/view_classifier_echonet"
  device: "cuda"
  epochs: 10
  batch_size: 8
  learning_rate: 0.0001
  optimizer: "Adam"
  weight_decay: 1e-5
  scheduler: "ReduceLROnPlateau"
  scheduler_params:
    factor: 0.2
    patience: 5
  monitor_metric: "val_accuracy"
  monitor_mode: "max"
  num_workers: 2
  seed: 42

visualization:
  plot_freq: 5
