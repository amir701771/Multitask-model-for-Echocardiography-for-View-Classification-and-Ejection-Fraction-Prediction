
dataset_type: echonet
# Data Configuration
data:
  dataset_name: "EchonetPseudoMultiTask"


  base_dir: "D:/Ddrive Downloads/final project/data/ECHONET-Dynamic" # Path to original dataset root

  # Path to the primary CSV file for training.

  csv_path: "D:/Ddrive Downloads/final project/results/pseudo_labels.csv"
 # Relative to project root

  # Path to Echonet video files
  video_dir: "D:/Ddrive Downloads/final project/data/ECHONET-Dynamic/Videos"


  # Path to read processed Echonet frames
  processed_dir: "processed_data/echonet"

  volume_tracings_path: "D:/Ddrive Downloads/final project/data/ECHONET-Dynamic/VolumeTracings.csv"


  view_mapping:
    'A2C': 0
    'A4C': 1
  num_views: 2

  # Column names expected in the csv_path file
  filename_col: "FileName"       # Links to video/frames
  ef_col: "EF"                   # Ejection Fraction target (ground truth)
  view_col: "PredictedView"    # View classification target (pseudo-label)
  split_col: "Split"            # Train/Val/Test split designation


  # Number of frames to sample per video/clip during training/evaluation
  frames_per_video: 4

# Preprocessing Configuration (Applied during training data loading)
preprocessing:
  # Target frame size [Height, Width] for model input
  img_size: [112, 112]


# Model Configuration
model:
  architecture: "cnn_multitask"
  backbone: "r2plus1d_18"
  pretrained: true
  dropout_rate: 0.4

# Training Configuration
training:
  # Directory where logs, checkpoints, and plots will be saved
  output_dir: "results/multitask_echonet"
  device: "cuda"
  epochs: 50
  batch_size: 4
  learning_rate: 0.0001
  optimizer: "Adam"
  scheduler: "StepLR"
  scheduler_params:
    # For StepLR:
    step_size: 15
    gamma: 0.1

  loss_alpha: 0.5               # Weight for view loss
  loss_beta: 0.5
  view_loss_class_weights: [12.26, 0.52]
# Weight for EF loss

  # --- Monitoring & Checkpointing ---
  monitor_metric: "val_mae"     # Metric to monitor for saving the best model
  monitor_mode: "min"           # "min" for loss/mae/rmse, "max" for accuracy/f1
  num_workers: 4                # DataLoader workers (0 for debugging)
  seed: 42                      # For reproducibility

# Visualization
visualization:
  plot_freq: 5                  # Save loss/metric plots every N epochs